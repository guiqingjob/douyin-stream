services:
  media-tools:
    build: .
    container_name: media-tools
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    environment:
      - MEDIA_TOOLS_PROJECT_ROOT=/app
      - PIPELINE_CONCURRENCY=5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
